<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SZS tv</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- HLS.js for playing .m3u8 streams -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <!-- Custom Theme Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#000080',
                        deepred: '#8B0000',
                        darkbg: '#121212',
                        panelbg: '#1e1e1e'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-darkbg text-gray-200 font-sans absolute inset-0 overflow-hidden">

    <div class="flex flex-col md:flex-row h-full w-full">
        
        <!-- Video Player Section -->
        <div class="flex-1 bg-black flex flex-col relative h-[40vh] md:h-full border-b md:border-b-0 md:border-r border-navy min-h-0">
            <div class="w-full bg-navy text-white py-2 px-4 shadow-md z-10 flex justify-between items-center shrink-0">
                <span class="font-bold text-lg tracking-wider">SZS tv</span>
                <span id="current-channel-name" class="text-xs text-gray-300 font-medium truncate ml-4">Loading...</span>
            </div>
            
            <div class="flex-1 flex items-center justify-center relative bg-black min-h-0 group">
                
                <!-- Fullscreen Hint Notification (3 seconds) -->
                <div id="fullscreen-hint" class="absolute z-30 bg-black bg-opacity-75 text-white px-4 py-2 rounded-md text-sm font-medium tracking-wide transition-opacity duration-1000 pointer-events-none">
                    Double click on screen to enter full screen
                </div>

                <!-- Video Element -->
                <video id="video-player" controls playsinline muted autoplay class="w-full h-full max-h-full object-contain focus:outline-none cursor-pointer"></video>
                
                <!-- Loading indicator -->
                <div id="loading" class="hidden absolute inset-0 flex items-center justify-center bg-black bg-opacity-75 z-20 pointer-events-none">
                    <div class="flex flex-col items-center">
                        <div class="w-8 h-8 border-4 border-navy border-t-deepred rounded-full animate-spin mb-2"></div>
                        <span id="loading-text" class="text-xs text-gray-300">Loading stream...</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Channel List Section -->
        <div class="w-full md:w-1/3 lg:w-1/4 bg-panelbg flex flex-col h-[60vh] md:h-full min-h-0">
            <div class="w-full bg-navy text-white py-2 px-4 text-sm font-semibold tracking-wide shadow-md shrink-0">
                Channel List
            </div>
            
            <div class="p-3 shrink-0">
                <input type="text" id="search" placeholder="Search channels..." class="w-full bg-darkbg text-sm text-gray-200 border border-gray-700 rounded p-2 focus:outline-none focus:border-deepred transition-colors">
            </div>

            <ul id="playlist" class="flex-1 overflow-y-auto p-2 space-y-1 scrollbar-thin min-h-0">
                <li class="text-center text-gray-500 text-sm mt-4">Loading playlist...</li>
            </ul>
        </div>
    </div>

    <script>
        const M3U_URL = 'https://raw.githubusercontent.com/bdtechexpert/live-tv-playlist/refs/heads/main/live-tv-playlist.m3u';
        let channels = [];
        let hls;
        let currentChannelIndex = -1; // Track currently playing channel index

        // Initialize Player
        const video = document.getElementById('video-player');
        const loading = document.getElementById('loading');
        const loadingText = document.getElementById('loading-text');
        const currentChannelName = document.getElementById('current-channel-name');
        const fullscreenHint = document.getElementById('fullscreen-hint');

        // Hide the fullscreen hint after 3 seconds
        setTimeout(() => {
            if (fullscreenHint) {
                fullscreenHint.classList.add('opacity-0');
                setTimeout(() => fullscreenHint.remove(), 1000);
            }
        }, 3000);

        // Double click to toggle Fullscreen
        video.addEventListener('dblclick', () => {
            if (!document.fullscreenElement) {
                if (video.requestFullscreen) video.requestFullscreen();
                else if (video.webkitRequestFullscreen) video.webkitRequestFullscreen();
                else if (video.msRequestFullscreen) video.msRequestFullscreen();
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                else if (document.msExitFullscreen) document.msExitFullscreen();
            }
        });

        async function fetchPlaylist() {
            try {
                const response = await fetch(M3U_URL);
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.text();
                parseM3U(data);
                renderPlaylist(channels);

                // Auto-play the first channel if available
                if (channels.length > 0) {
                    playChannel(0);
                } else {
                    currentChannelName.textContent = "No channels found";
                }

            } catch (error) {
                console.error('Error fetching playlist:', error);
                document.getElementById('playlist').innerHTML = `
                    <div class="p-4 text-deepred text-sm text-center">
                        Failed to load playlist. <br> (Note: Check console. Sometimes AdBlockers or CORS policies block raw github links).
                    </div>`;
                currentChannelName.textContent = "Error loading";
            }
        }

        function parseM3U(data) {
            const lines = data.split('\n');
            let currentChannel = null;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();

                if (line.startsWith('#EXTINF:')) {
                    currentChannel = {
                        name: 'Unknown Channel',
                        logo: '',
                        url: '',
                        originalIndex: channels.length // Store original index for auto-next tracking
                    };

                    // Extract Logo
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    if (logoMatch) currentChannel.logo = logoMatch[1];

                    // Extract Name
                    const nameMatch = line.match(/,(.+)$/);
                    if (nameMatch) currentChannel.name = nameMatch[1].trim();
                    else {
                        const tvgNameMatch = line.match(/tvg-name="([^"]+)"/);
                        if (tvgNameMatch) currentChannel.name = tvgNameMatch[1];
                    }
                } 
                else if (line !== '' && !line.startsWith('#') && currentChannel) {
                    currentChannel.url = line;
                    channels.push(currentChannel);
                    currentChannel = null;
                }
            }
        }

        function renderPlaylist(channelData) {
            const playlistEl = document.getElementById('playlist');
            playlistEl.innerHTML = '';

            if (channelData.length === 0) {
                playlistEl.innerHTML = '<li class="text-center text-gray-500 text-sm mt-4">No channels found.</li>';
                return;
            }

            channelData.forEach((channel) => {
                const li = document.createElement('li');
                li.className = 'flex items-center p-2 rounded cursor-pointer transition-colors duration-200 border-l-4 border-transparent hover:bg-gray-800 channel-item';
                li.dataset.index = channel.originalIndex; // Save index in DOM attribute
                
                // Fallback image if logo is missing or broken
                const defaultLogo = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="%234b5563" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"></rect><polyline points="17 2 12 7 7 2"></polyline></svg>';
                const logoSrc = channel.logo ? channel.logo : defaultLogo;

                li.innerHTML = `
                    <div class="w-10 h-10 flex-shrink-0 bg-white rounded overflow-hidden mr-3 flex items-center justify-center p-0.5">
                        <img src="${logoSrc}" onerror="this.src='${defaultLogo}'" class="max-w-full max-h-full object-contain" alt="logo">
                    </div>
                    <div class="flex-1 truncate">
                        <span class="text-sm font-medium text-gray-200 truncate block">${channel.name}</span>
                    </div>
                `;

                li.addEventListener('click', () => {
                    playChannel(channel.originalIndex);
                });

                // Re-apply active state if searching
                if(channel.originalIndex === currentChannelIndex) {
                    li.classList.remove('border-transparent');
                    li.classList.add('bg-gray-800', 'border-deepred', 'bg-opacity-50');
                }

                playlistEl.appendChild(li);
            });
        }

        // Central function to handle channel changing, UI updates, and playing
        function playChannel(index) {
            if (index < 0 || index >= channels.length) return;
            
            currentChannelIndex = index;
            const channel = channels[index];
            
            currentChannelName.textContent = channel.name;
            loadingText.textContent = "Loading stream...";

            // Update active state styles in the list
            document.querySelectorAll('.channel-item').forEach(el => {
                el.classList.remove('bg-gray-800', 'border-deepred', 'bg-opacity-50');
                el.classList.add('border-transparent');
            });
            
            const activeLi = document.querySelector(`.channel-item[data-index="${index}"]`);
            if (activeLi) {
                activeLi.classList.remove('border-transparent');
                activeLi.classList.add('bg-gray-800', 'border-deepred', 'bg-opacity-50');
                // Optional: Scroll to the active item smoothly
                activeLi.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            playStream(channel.url);
        }

        // Function to handle playing next channel automatically on error
        function playNextChannel() {
            loadingText.textContent = "Stream failed. Trying next...";
            console.log("Channel failed, attempting to play next channel...");
            
            let nextIndex = currentChannelIndex + 1;
            if (nextIndex < channels.length) {
                playChannel(nextIndex);
            } else {
                currentChannelName.textContent = "End of playlist.";
                loading.classList.add('hidden');
            }
        }

        function playStream(url) {
            loading.classList.remove('hidden');
            
            if (hls) {
                hls.destroy();
            }

            if (Hls.isSupported()) {
                hls = new Hls({
                    maxMaxBufferLength: 30,
                });
                hls.loadSource(url);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    loading.classList.add('hidden');
                    video.play().catch(e => console.log("Playback prevented:", e));
                });

                hls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        console.error('HLS Error:', data);
                        // If it's a network or media error, skip to next channel after 1 second delay
                        if (data.type === Hls.ErrorTypes.NETWORK_ERROR || data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                            hls.destroy();
                            setTimeout(playNextChannel, 1000); 
                        } else {
                            loading.classList.add('hidden');
                        }
                    }
                });
            } 
            // Fallback for native HLS support (like Safari)
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', function() {
                    loading.classList.add('hidden');
                    video.play();
                });
            }
        }

        // Add Error Listener for Native Video Player (Safari/iOS)
        video.addEventListener('error', function() {
            console.error('Native video playback error');
            if (channels.length > 0) {
                setTimeout(playNextChannel, 1000);
            }
        });

        // Search functionality
        document.getElementById('search').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filteredChannels = channels.filter(channel => 
                channel.name.toLowerCase().includes(searchTerm)
            );
            renderPlaylist(filteredChannels);
        });

        // Start
        fetchPlaylist();
    </script>
</body>
</html>
